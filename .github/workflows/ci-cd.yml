name: Ecommerce App CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build: #Continuous Integration
    runs-on: ubuntu-latest

    steps:
      #step 1: checkout the code
      - name: Checkout code
        uses: actions/checkout@v5

      #Step 2: setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      #Step 3: install dependencies
      - name: Install dependencies
        run: npm install

      #Step 4: Run tests
      - name: Run tests
        run: npm test -- --run
      - name: Build React app
        run: npm run build

  deploy: #Continuous Deployment
    runs-on: ubuntu-latest
    needs: build # this job will run after the build job is successful

    steps:
      #step 1: checkout the code
      - name: Checkout code
        uses: actions/checkout@v5

      #Step 2: setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      #Step 3: install dependencies
      - name: Install dependencies
        run: npm install

      #Step 4: Deploy to Vercel
      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }} # Ensure you have set the VERCEL_TOKEN secret in your repository settings
